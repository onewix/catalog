<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Преміум Магазин</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --text-color: #ffffff;
            --accent-color: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --danger-color: #ff3b30;
            --disabled-color: rgba(255, 255, 255, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-bottom: 80px;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* Glassmorphism Classes */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        /* Header */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 0 0 16px 16px;
        }
        
        .cart-icon { position: relative; cursor: pointer; }
        .cart-badge {
            position: absolute; top: -5px; right: -10px;
            background: var(--text-color); color: var(--bg-color);
            font-size: 12px; font-weight: bold;
            padding: 2px 6px; border-radius: 10px;
        }

        /* Page Container */
        .page { display: none; padding: 20px; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Catalog Layout */
        .products-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        
        .product-card {
            padding: 12px; display: flex; flex-direction: column; align-items: center; text-align: center;
        }
        .product-img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 12px; margin-bottom: 12px; }
        .product-name { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
        .product-price { font-size: 14px; opacity: 0.8; margin-bottom: 12px; }
        
        button {
            width: 100%; padding: 10px; border: none; border-radius: 12px;
            background: var(--text-color); color: var(--bg-color);
            font-weight: 600; cursor: pointer; transition: 0.2s ease;
        }
        button:active { transform: scale(0.96); }
        button:disabled { background: var(--disabled-color); cursor: not-allowed; }
        button.danger { background: var(--danger-color); color: white; }

        /* Cart View */
        .cart-item {
            display: flex; align-items: center; padding: 12px; margin-bottom: 12px; gap: 12px;
        }
        .cart-item-img { width: 60px; height: 60px; object-fit: cover; border-radius: 10px; }
        .cart-item-info { flex: 1; }
        .cart-controls { display: flex; align-items: center; gap: 12px; }
        .cart-controls button { width: 30px; height: 30px; padding: 0; font-size: 18px; border-radius: 8px; }
        
        .cart-total { margin-top: 20px; font-size: 20px; font-weight: bold; text-align: right; }
        .contact-info {
            margin-top: 40px; text-align: center; padding: 20px;
            font-size: 14px; line-height: 1.5; color: rgba(255,255,255,0.7);
        }
        .contact-info a { color: #fff; font-weight: bold; text-decoration: none; }

        /* Admin FAB & Form */
        .admin-fab {
            display: none; position: fixed; bottom: 30px; right: 30px;
            width: 56px; height: 56px; border-radius: 28px;
            background: var(--text-color); color: var(--bg-color);
            font-size: 28px; line-height: 56px; text-align: center;
            box-shadow: 0 4px 12px rgba(255,255,255,0.3); z-index: 1000; cursor: pointer;
        }

        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 14px; opacity: 0.8; }
        .form-group input {
            width: 100%; padding: 12px; background: rgba(0,0,0,0.2);
            border: 1px solid var(--glass-border); border-radius: 12px; color: white; outline: none;
        }
        
        /* Image Upload UI */
        .image-upload-wrapper {
            width: 100%; aspect-ratio: 1; border-radius: 16px;
            border: 2px dashed var(--glass-border); display: flex;
            justify-content: center; align-items: center; cursor: pointer;
            overflow: hidden; position: relative; background: rgba(0,0,0,0.2);
        }
        .image-upload-wrapper svg { width: 40px; height: 40px; opacity: 0.5; }
        .image-upload-wrapper img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
        #file-input { display: none; }

        /* Back Button */
        .back-btn { background: transparent; border: 1px solid var(--text-color); color: var(--text-color); margin-bottom: 20px;}
        .admin-controls { margin-top: 10px; display: flex; gap: 8px;}
        .admin-controls button { font-size: 12px; padding: 6px; }

    </style>
</head>
<body>

    <header class="glass">
        <h2 id="header-title">Каталог</h2>
        <div class="cart-icon" onclick="openPage('cart')">
            🛒 <span class="cart-badge" id="cart-count">0</span>
        </div>
    </header>

    <div id="catalog" class="page active">
        <div class="products-grid" id="products-container">
            </div>
    </div>

    <div id="cart" class="page">
        <button class="back-btn" onclick="openPage('catalog')">← Назад до каталогу</button>
        <div id="cart-container">
            </div>
        <div class="cart-total" id="cart-total-price">Разом: 0 ₴</div>
        
        <div class="glass contact-info">
            Для оплати та оформлення замовлення зверніться у Telegram:<br>
            <a href="https://t.me/jess1k_energyy" target="_blank">@jess1k_energyy</a>
        </div>
    </div>

    <div id="admin" class="page">
        <button class="back-btn" onclick="openPage('catalog')">← Скасувати</button>
        <h2 style="margin-bottom: 20px;" id="admin-title">Новий товар</h2>
        
        <div class="form-group">
            <label>Фото товару</label>
            <label class="image-upload-wrapper" id="upload-wrapper">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                    <circle cx="12" cy="13" r="4"></circle>
                </svg>
                <img id="preview-img" style="display: none;">
                <input type="file" id="file-input" accept="image/*" onchange="handleImageUpload(event)">
            </label>
        </div>
        
        <div class="form-group">
            <label>Назва</label>
            <input type="text" id="p-name" placeholder="Введіть назву">
        </div>
        <div class="form-group">
            <label>Ціна (₴)</label>
            <input type="number" id="p-price" placeholder="0">
        </div>
        <div class="form-group">
            <label>Кількість на складі (Stock)</label>
            <input type="number" id="p-stock" placeholder="0">
        </div>
        
        <button onclick="saveProduct()">Зберегти товар</button>
    </div>

    <div class="admin-fab" id="admin-fab" onclick="openAdminForm()">+</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // НАЛАШТУВАННЯ
        const ADMIN_IDS = [5548318726]; // ⚠️ ЗАМІНІТЬ НА ВАШ TELEGRAM ID
        const API_URL = 'http://127.0.0.1:8000'; // URL вашого бекенду
        
        // Стан додатку
        let products = [];
        let cart = {}; // { productId: quantity }
        let currentEditId = null;
        let base64Image = null;

        const userId = tg.initDataUnsafe?.user?.id;
        const isAdmin = ADMIN_IDS.includes(userId);

        // Ініціалізація
        if (isAdmin) {
            document.getElementById('admin-fab').style.display = 'block';
        }

        function haptic() {
            tg.HapticFeedback.impactOccurred('light');
        }

        function openPage(pageId) {
            haptic();
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            
            if(pageId === 'catalog') {
                document.getElementById('header-title').innerText = 'Каталог';
                fetchProducts();
            } else if(pageId === 'cart') {
                document.getElementById('header-title').innerText = 'Кошик';
                renderCart();
            } else if(pageId === 'admin') {
                document.getElementById('header-title').innerText = 'Керування';
            }
        }

        // --- API РОБОТА З ТОВАРАМИ ---
        
        async function fetchProducts() {
            try {
                const res = await fetch(`${API_URL}/products`);
                products = await res.json();
                renderCatalog();
            } catch (err) {
                console.error("Помилка завантаження товарів", err);
            }
        }

        async function saveProduct() {
            haptic();
            const name = document.getElementById('p-name').value;
            const price = parseFloat(document.getElementById('p-price').value);
            const stock = parseInt(document.getElementById('p-stock').value);

            if(!name || isNaN(price) || isNaN(stock) || !base64Image) {
                tg.showAlert("Будь ласка, заповніть всі поля та додайте фото");
                return;
            }

            const payload = { name, price, stock, image: base64Image };
            const method = currentEditId ? 'PUT' : 'POST';
            const url = currentEditId ? `${API_URL}/products/${currentEditId}` : `${API_URL}/products`;

            try {
                await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                openPage('catalog');
            } catch(e) {
                tg.showAlert("Помилка збереження");
            }
        }

        async function deleteProduct(id) {
            haptic();
            if(!confirm("Ви впевнені, що хочете видалити товар?")) return;
            try {
                await fetch(`${API_URL}/products/${id}`, { method: 'DELETE' });
                fetchProducts();
            } catch(e) {
                tg.showAlert("Помилка видалення");
            }
        }

        // --- РЕНДЕР КАТАЛОГУ ---
        
        function renderCatalog() {
            const container = document.getElementById('products-container');
            container.innerHTML = '';

            products.forEach(p => {
                const isOutOfStock = p.stock <= 0;
                
                let adminHtml = '';
                if(isAdmin) {
                    adminHtml = `
                        <div class="admin-controls">
                            <button onclick="editProduct('${p.id}')">✏️</button>
                            <button class="danger" onclick="deleteProduct('${p.id}')">🗑️</button>
                        </div>
                    `;
                }

                const btnHtml = isOutOfStock 
                    ? `<button disabled>Немає в наявності</button>`
                    : `<button onclick="addToCart('${p.id}')">Додати у кошик</button>`;

                const card = document.createElement('div');
                card.className = 'glass product-card';
                card.innerHTML = `
                    <img src="${p.image}" class="product-img">
                    <div class="product-name">${p.name}</div>
                    <div class="product-price">${p.price} ₴ (Залишок: ${p.stock})</div>
                    ${btnHtml}
                    ${adminHtml}
                `;
                container.appendChild(card);
            });
        }

        // --- ЛОГІКА КОШИКА ---
        
        function updateCartBadge() {
            const count = Object.values(cart).reduce((a, b) => a + b, 0);
            document.getElementById('cart-count').innerText = count;
        }

        function addToCart(id) {
            haptic();
            const product = products.find(p => p.id === id);
            if(!product) return;

            const currentQty = cart[id] || 0;
            if(currentQty >= product.stock) {
                tg.showAlert(`Доступно лише ${product.stock} шт.`);
                return;
            }

            cart[id] = currentQty + 1;
            updateCartBadge();
            tg.showAlert("Товар додано у кошик!"); // Ненав'язливе повідомлення від Telegram
        }

        function changeCartQty(id, delta) {
            haptic();
            const product = products.find(p => p.id === id);
            
            if(!cart[id]) return;
            
            const newQty = cart[id] + delta;
            
            if(newQty > product.stock) {
                tg.showAlert(`Доступно лише ${product.stock} шт.`);
                return;
            }
            
            if(newQty <= 0) {
                delete cart[id];
            } else {
                cart[id] = newQty;
            }
            updateCartBadge();
            renderCart();
        }

        function renderCart() {
            const container = document.getElementById('cart-container');
            container.innerHTML = '';
            let totalSum = 0;

            const cartIds = Object.keys(cart);
            if(cartIds.length === 0) {
                container.innerHTML = '<div style="text-align:center; opacity:0.5; margin-top: 20px;">Кошик порожній</div>';
                document.getElementById('cart-total-price').innerText = 'Разом: 0 ₴';
                return;
            }

            cartIds.forEach(id => {
                const product = products.find(p => p.id === id);
                if(!product) return;
                
                const qty = cart[id];
                const sum = qty * product.price;
                totalSum += sum;

                const item = document.createElement('div');
                item.className = 'glass cart-item';
                item.innerHTML = `
                    <img src="${product.image}" class="cart-item-img">
                    <div class="cart-item-info">
                        <div style="font-weight: 600;">${product.name}</div>
                        <div style="font-size: 14px; opacity: 0.8;">${product.price} ₴</div>
                    </div>
                    <div class="cart-controls">
                        <button class="glass" onclick="changeCartQty('${id}', -1)">-</button>
                        <span>${qty}</span>
                        <button class="glass" onclick="changeCartQty('${id}', 1)">+</button>
                    </div>
                `;
                container.appendChild(item);
            });

            document.getElementById('cart-total-price').innerText = `Разом: ${totalSum} ₴`;
        }

        // --- ЛОГІКА АДМІНА (Форма) ---

        function handleImageUpload(event) {
            const file = event.target.files[0];
            if(!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                base64Image = e.target.result;
                const img = document.getElementById('preview-img');
                img.src = base64Image;
                img.style.display = 'block';
            };
            reader.readAsDataURL(file);
        }

        function openAdminForm() {
            currentEditId = null;
            document.getElementById('admin-title').innerText = 'Новий товар';
            document.getElementById('p-name').value = '';
            document.getElementById('p-price').value = '';
            document.getElementById('p-stock').value = '';
            document.getElementById('preview-img').style.display = 'none';
            base64Image = null;
            openPage('admin');
        }

        function editProduct(id) {
            const p = products.find(x => x.id === id);
            if(!p) return;
            currentEditId = id;
            document.getElementById('admin-title').innerText = 'Редагувати товар';
            document.getElementById('p-name').value = p.name;
            document.getElementById('p-price').value = p.price;
            document.getElementById('p-stock').value = p.stock;
            
            base64Image = p.image;
            const img = document.getElementById('preview-img');
            img.src = base64Image;
            img.style.display = 'block';
            
            openPage('admin');
        }

        // Запуск
        fetchProducts();

    </script>
</body>
</html>
