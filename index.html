<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Store Debug</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0a0a0a; --card: #161618; --accent: #007aff; --text: #ffffff; --hint: #8e8e93; --glass: rgba(255, 255, 255, 0.05); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 16px; }

        .page { display: none; }
        .page.active { display: block; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-icon { background: none; border: none; color: white; font-size: 20px; cursor: pointer; }
        
        .catalog { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .product-card { background: var(--card); border-radius: 16px; padding: 10px; position: relative; border: 1px solid var(--glass); }
        .product-img { width: 100%; height: 110px; object-fit: cover; border-radius: 10px; background: var(--glass); }
        
        /* КНОПКИ АДМИНА */
        .admin-controls { position: absolute; top: 5px; right: 5px; display: none; gap: 5px; z-index: 5; }
        .admin-btn { background: rgba(0,0,0,0.8); border: none; color: white; padding: 6px; border-radius: 8px; font-size: 12px; }

        .input-field { width: 100%; background: var(--glass); border: 1px solid var(--glass); border-radius: 12px; padding: 12px; color: white; outline: none; margin-top: 5px; }
        .main-btn { width: 100%; background: var(--accent); border: none; padding: 16px; border-radius: 16px; color: white; font-weight: 600; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="catalog-page" class="page active">
        <div class="header">
            <h2 id="main-title" style="font-size: 16px;">Магазин</h2> 
            <div style="display: flex; gap: 15px;">
                <button id="admin-add-btn" class="btn-icon" style="display:none;" onclick="showModal()"><i class="fa-solid fa-plus"></i></button>
                <button class="btn-icon" onclick="openPage('cart-page')"><i class="fa-solid fa-cart-shopping"></i></button>
            </div>
        </div>
        <div class="catalog" id="catalog-list"></div>
    </div>

    <div id="cart-page" class="page">
        <div class="header"><button class="btn-icon" onclick="openPage('catalog-page')"><i class="fa-solid fa-arrow-left"></i></button><h2>Корзина</h2></div>
        <div id="cart-list"></div>
        <div style="margin-top:20px;"><button class="main-btn" onclick="alert('Данные заказа...')">Оформить</button></div>
    </div>

    <div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:100; justify-content:center; align-items:center;">
        <div style="background:var(--card); padding:20px; border-radius:20px; width:85%;">
            <h3>Новый товар</h3>
            <input type="text" id="p-name" class="input-field" placeholder="Название">
            <input type="number" id="p-price" class="input-field" placeholder="Цена">
            <input type="file" id="p-img" style="margin-top:10px;" accept="image/*">
            <button class="main-btn" onclick="saveProduct()">Сохранить</button>
            <button class="btn-icon" style="width:100%; margin-top:10px;" onclick="hideModal()">Отмена</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // 1. ВПИШИТЕ СЮДА ВАШИ ID (как числа)
        const ADMIN_IDS = [1133070247, 5548318726]; 

        // 2. ПОЛУЧАЕМ ID ТЕКУЩЕГО ПОЛЬЗОВАТЕЛЯ
        const rawUserId = tg.initDataUnsafe?.user?.id;
        
        // ВЫВОДИМ ID В ЗАГОЛОВОК ДЛЯ ТЕСТА (потом удалим эту строку)
        document.getElementById('main-title').innerText = "ID: " + (rawUserId || "не найден");

        // ПРОВЕРКА ПРАВ (приводим к одному типу)
        const isAdmin = ADMIN_IDS.map(Number).includes(Number(rawUserId));

        if(isAdmin) {
            document.getElementById('admin-add-btn').style.display = 'block';
        }

        let products = JSON.parse(localStorage.getItem('products')) || [];

        function openPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function showModal() { document.getElementById('modal').style.display = 'flex'; }
        function hideModal() { document.getElementById('modal').style.display = 'none'; }

        function saveProduct() {
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            const file = document.getElementById('p-img').files[0];

            if(!name || !price) return alert("Заполните поля");

            const add = (img) => {
                products.push({ id: Date.now(), name, price, img: img || '' });
                localStorage.setItem('products', JSON.stringify(products));
                renderCatalog();
                hideModal();
            };

            if(file) {
                let r = new FileReader();
                r.onload = e => add(e.target.result);
                r.readAsDataURL(file);
            } else add(null);
        }

        function deleteProduct(id) {
            products = products.filter(x => x.id !== id);
            localStorage.setItem('products', JSON.stringify(products));
            renderCatalog();
        }

        function renderCatalog() {
            const list = document.getElementById('catalog-list');
            list.innerHTML = products.map(p => `
                <div class="product-card">
                    <div class="admin-controls" style="${isAdmin ? 'display:flex' : ''}">
                        <button class="admin-btn" onclick="deleteProduct(${p.id})"><i class="fa-solid fa-trash"></i></button>
                    </div>
                    <img src="${p.img || ''}" class="product-img">
                    <div style="font-size:14px; margin-top:5px;">${p.name}</div>
                    <div style="color:var(--accent); font-weight:bold;">${p.price} ₴</div>
                </div>
            `).join('');
        }

        renderCatalog();
    </script>
</body>
</html>
