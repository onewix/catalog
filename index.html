<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Минималистичный Каталог</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        /* БАЗОВЫЕ НАСТРОЙКИ */
        :root {
            /* Цвета для темной темы по умолчанию (если Telegram не передаст свои) */
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --text-secondary: #aaaaaa;
            --accent-color: #2aabee;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            /* Используем цвета Telegram, если они есть, иначе наши дефолтные темные */
            background-color: var(--tg-theme-bg-color, var(--bg-color));
            color: var(--tg-theme-text-color, var(--text-color));
            padding: 20px;
            /* Плавное появление всего экрана */
            animation: fadeInBody 0.6s ease-out;
        }

        /* АНИМАЦИИ */
        @keyframes fadeInBody {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUpCard {
            from { 
                opacity: 0; 
                transform: translateY(20px); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0); 
            }
        }

        /* ЗАГОЛОВОК СТРАНИЦЫ */
        .header {
            text-align: center;
            margin-bottom: 24px;
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* СЕТКА КАТАЛОГА */
        .catalog {
            display: grid;
            /* Карточки будут автоматически подстраиваться под ширину экрана */
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        /* КАРТОЧКА ТОВАРА */
        .product-card {
            background-color: var(--tg-theme-secondary-bg-color, var(--card-bg));
            border-radius: 16px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Анимация при нажатии/наведении */
            transition: transform 0.2s ease, background-color 0.2s ease;
            /* Начальное состояние для анимации появления */
            opacity: 0;
            animation: slideUpCard 0.5s ease-out forwards;
        }

        /* Плавное уменьшение при клике (эффект нажатия) */
        .product-card:active {
            transform: scale(0.96);
        }

        /* Задержка анимации для каждой карточки, чтобы они появлялись по очереди */
        .product-card:nth-child(1) { animation-delay: 0.1s; }
        .product-card:nth-child(2) { animation-delay: 0.2s; }
        .product-card:nth-child(3) { animation-delay: 0.3s; }
        .product-card:nth-child(4) { animation-delay: 0.4s; }

        /* ИЗОБРАЖЕНИЕ ТОВАРА (Заглушка) */
        .product-image {
            width: 100%;
            height: 120px;
            background-color: #2c2c2c; /* Цвет заглушки */
            border-radius: 12px;
            margin-bottom: 12px;
            /* Если добавите настоящие картинки, они будут красиво обрезаться */
            object-fit: cover; 
        }

        /* НАЗВАНИЕ ТОВАРА */
        .product-title {
            font-size: 16px;
            font-weight: 500;
            text-align: center;
            margin-bottom: 4px;
        }

        /* ЦЕНА ТОВАРА */
        .product-price {
            font-size: 14px;
            color: var(--tg-theme-hint-color, var(--text-secondary));
            margin-bottom: 12px;
        }

        /* КНОПКА "ДОБАВИТЬ" */
        .add-btn {
            background-color: var(--tg-theme-button-color, var(--accent-color));
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 8px;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: opacity 0.2s ease;
        }

        .add-btn:active {
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="header">Каталог</div>

    <div class="catalog" id="catalog-container">

        <div class="product-card">
            <div class="product-image"></div> <div class="product-title">Товар 1</div>
            <div class="product-price">1 500 ₽</div>
            <button class="add-btn" onclick="addToCart('Товар 1', 1500)">Добавить</button>
        </div>

        <div class="product-card">
            <div class="product-image"></div>
            <div class="product-title">Товар 2</div>
            <div class="product-price">2 300 ₽</div>
            <button class="add-btn" onclick="addToCart('Товар 2', 2300)">Добавить</button>
        </div>

        <div class="product-card">
            <div class="product-image"></div>
            <div class="product-title">Товар 3</div>
            <div class="product-price">900 ₽</div>
            <button class="add-btn" onclick="addToCart('Товар 3', 900)">Добавить</button>
        </div>

        <div class="product-card">
            <div class="product-image"></div>
            <div class="product-title">Товар 4</div>
            <div class="product-price">4 100 ₽</div>
            <button class="add-btn" onclick="addToCart('Товар 4', 4100)">Добавить</button>
        </div>

    </div>

    <script>
        // Инициализация Telegram Web App
        let tg = window.Telegram.WebApp;

        // Расширяем приложение на весь экран телефона
        tg.expand();

        // Сообщаем Telegram, что приложение готово к отображению
        tg.ready();

        // Переменные для хранения корзины
        let cart = [];
        let totalPrice = 0;

        // МАРКЕР: Функция добавления в корзину
        function addToCart(itemName, itemPrice) {
            // Добавляем товар в массив корзины
            cart.push({name: itemName, price: itemPrice});
            totalPrice += itemPrice;

            // Включаем вибрацию (тактильный отклик) при нажатии кнопки
            tg.HapticFeedback.impactOccurred('light');

            // Показываем Главную Кнопку (MainButton) внизу экрана Telegram
            tg.MainButton.text = "ОФОРМИТЬ (" + totalPrice + " ₴)";
            tg.MainButton.show();
        }

        // МАРКЕР: Что происходит при нажатии на Главную Кнопку внизу
        tg.MainButton.onClick(function() {
            // Здесь мы можем отправить данные обратно боту
            let dataToSend = JSON.stringify(cart);
            tg.sendData(dataToSend);
            // Закрываем мини-приложение после отправки
            tg.close();
        });
    </script>
</body>
</html>
