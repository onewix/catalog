<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TG Shop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: var(--tg-theme-bg-color, #1a1a1a); color: var(--tg-theme-text-color, #ffffff); font-family: sans-serif; }
        .card { background: var(--tg-theme-secondary-bg-color, #242424); border-radius: 12px; }
        .btn-primary { background: var(--tg-theme-button-color, #2481cc); color: var(--tg-theme-button-text-color, #ffffff); }
        .fade-enter-active, .fade-leave-active { transition: opacity 0.3s; }
        .fade-enter-from, .fade-leave-to { opacity: 0; }
    </style>
</head>
<body>
<div id="app" class="p-4 pb-24">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold">Магазин</h1>
        <div class="flex gap-4">
            <button v-if="isAdmin" @click="showAdmin = true" class="text-yellow-500 text-xl"><i class="fas fa-tools"></i></button>
            <button @click="view = 'cart'" class="relative text-xl">
                <i class="fas fa-shopping-cart"></i>
                <span v-if="cartCount" class="absolute -top-2 -right-2 bg-red-500 text-xs rounded-full px-1.5">{{ cartCount }}</span>
            </button>
        </div>
    </div>

    <div v-if="view === 'catalog'" class="grid grid-cols-2 gap-4">
        <div v-for="item in products" :key="item.id" class="card p-3 flex flex-col">
            <img :src="item.image" class="w-full h-32 object-cover rounded-lg mb-2">
            <h3 class="font-semibold text-sm mb-1">{{ item.name }}</h3>
            <p class="text-blue-400 font-bold mb-2">{{ item.price }} ₽</p>
            <button @click="addToCart(item)" class="btn-primary py-2 rounded-lg text-xs mt-auto">
                Добавить
            </button>
        </div>
    </div>

    <div v-if="view === 'cart'" class="space-y-4">
        <button @click="view = 'catalog'" class="mb-4 text-blue-400"><i class="fas fa-arrow-left"></i> Назад</button>
        <div v-for="item in cart" :key="item.id" class="card p-4 flex justify-between items-center">
            <div>
                <h4 class="font-bold">{{ item.name }}</h4>
                <p>{{ item.price }} ₽ x {{ item.qty }}</p>
            </div>
            <div class="flex items-center gap-3">
                <button @click="updateQty(item, -1)" class="p-2"><i class="fas fa-minus"></i></button>
                <span>{{ item.qty }}</span>
                <button @click="updateQty(item, 1)" class="p-2"><i class="fas fa-plus"></i></button>
            </div>
        </div>
        <div v-if="cart.length > 0" class="mt-6">
            <h3 class="text-xl font-bold mb-4">Итого: {{ totalSum }} ₽</h3>
            <div class="space-y-3">
                <input v-model="form.name" placeholder="ФИО получателя" class="w-full p-3 rounded-lg bg-gray-800 border-none">
                <input v-model="form.phone" type="tel" placeholder="Телефон (только цифры)" class="w-full p-3 rounded-lg bg-gray-800 border-none">
                <input v-model="form.address" placeholder="Адрес отделения почты" class="w-full p-3 rounded-lg bg-gray-800 border-none">
                <p class="text-xs text-white/50 italic">Пожалуйста, внимательно проверяйте данные. Ошибки могут привести к невозможности доставки.</p>
                <button @click="checkout" class="btn-primary w-full py-4 rounded-xl font-bold">Оформить заказ</button>
            </div>
        </div>
        <p v-else class="text-center opacity-50">Корзина пуста</p>
    </div>

    <div v-if="showAdmin" class="fixed inset-0 bg-black/90 z-50 p-6 overflow-y-auto">
        <div class="flex justify-between mb-6">
            <h2 class="text-xl font-bold">Админ-панель</h2>
            <button @click="showAdmin = false"><i class="fas fa-times text-2xl"></i></button>
        </div>
        <div class="card p-4 mb-6">
            <h3 class="mb-2">Новый товар</h3>
            <input v-model="newP.name" placeholder="Название" class="w-full mb-2 p-2 rounded bg-gray-700">
            <input v-model.number="newP.price" type="number" placeholder="Цена" class="w-full mb-2 p-2 rounded bg-gray-700">
            <input type="file" @change="handleUpload" class="text-xs mb-4">
            <button @click="saveProduct" class="btn-primary w-full py-2 rounded">Сохранить</button>
        </div>
        <div v-for="p in products" :key="p.id" class="flex justify-between items-center border-b border-white/10 py-2">
            <span>{{ p.name }}</span>
            <button @click="deleteProduct(p.id)" class="text-red-500"><i class="fas fa-trash"></i></button>
        </div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const ADMIN_IDS = [5548318726]; // ЗАМЕНИТЕ НА ВАШ ID

    Vue.createApp({
        data() {
            return {
                view: 'catalog',
                products: [],
                cart: [],
                showAdmin: false,
                isAdmin: ADMIN_IDS.includes(tg.initDataUnsafe.user?.id),
                newP: { name: '', price: null, image: '' },
                form: { name: '', phone: '', address: '' }
            }
        },
        computed: {
            cartCount() { return this.cart.reduce((a, b) => a + b.qty, 0) },
            totalSum() { return this.cart.reduce((a, b) => a + (b.price * b.qty), 0) }
        },
        mounted() {
            // В GitHub Pages без бэкенда мы эмулируем загрузку.
            // Бот при открытии может передать данные через URL или мы можем сделать fetch
            this.loadProducts();
        },
        methods: {
            loadProducts() {
                // В идеале: fetch('products.json')
                // Для демо примера загрузим пустой массив или дефолт
                fetch('products.json').then(r => r.json()).then(data => this.products = data).catch(e => console.log('Wait for bot data'));
            },
            addToCart(item) {
                const inCart = this.cart.find(i => i.id === item.id);
                if (inCart) {
                    if (inCart.qty < 5) {
                        inCart.qty++;
                        tg.HapticFeedback.impactOccurred('light');
                    } else {
                        tg.showAlert('Максимум 5 единиц одного товара!');
                    }
                } else {
                    this.cart.push({ ...item, qty: 1 });
                    tg.HapticFeedback.notificationOccurred('success');
                }
            },
            updateQty(item, delta) {
                if (delta > 0 && item.qty >= 5) return;
                item.qty += delta;
                if (item.qty <= 0) this.cart = this.cart.filter(i => i.id !== item.id);
                tg.HapticFeedback.selectionChanged();
            },
            handleUpload(e) {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = (f) => { this.newP.image = f.target.result; };
                reader.readAsDataURL(file);
            },
            saveProduct() {
                const p = { ...this.newP, id: Date.now() };
                this.products.push(p);
                this.sendAdminAction('add', p);
                this.newP = { name: '', price: null, image: '' };
            },
            deleteProduct(id) {
                this.products = this.products.filter(p => p.id !== id);
                this.sendAdminAction('delete', { id });
            },
            sendAdminAction(action, data) {
                // Отправляем команду боту на изменение JSON
                tg.sendData(JSON.stringify({ type: 'admin', action, data }));
            },
            checkout() {
                if (!this.form.name || !this.form.phone || !this.form.address) {
                    return tg.showAlert('Заполните все поля!');
                }
                const orderData = {
                    type: 'order',
                    user: this.form,
                    items: this.cart,
                    total: this.totalSum
                };
                tg.sendData(JSON.stringify(orderData));
                this.cart = [];
                tg.close();
            }
        }
    }).mount('#app');
</script>
</body>
</html>
