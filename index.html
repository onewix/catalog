<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minimal Catalog</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        /* МАРКЕР: ПЕРЕМЕННЫЕ ЦВЕТОВ */
        :root {
            --bg-color: #0f0f0f;
            --card-bg: #1a1a1a;
            --text-main: #ffffff;
            --text-hint: #707070;
            --accent: #007aff; /* Синий в стиле iOS */
            --danger: #ff3b30;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--tg-theme-bg-color, var(--bg-color));
            color: var(--tg-theme-text-color, var(--text-main));
            padding: 16px;
            padding-bottom: 100px; /* Место для корзины внизу */
            overflow-x: hidden;
        }

        /* МАРКЕР: ШАПКА И КНОПКА + */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .add-product-btn {
            background: var(--tg-theme-button-color, var(--accent));
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .add-product-btn:active { transform: scale(0.9); }

        /* МАРКЕР: СЕТКА КАТАЛОГА (КОМПАКТНАЯ) */
        .catalog {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* Два товара в ряд */
            gap: 12px;
        }

        .product-card {
            background: var(--tg-theme-secondary-bg-color, var(--card-bg));
            border-radius: 12px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .product-img {
            width: 100%;
            height: 100px; /* Уменьшили высоту картинок */
            object-fit: cover;
            border-radius: 8px;
            background: #252525;
            margin-bottom: 8px;
        }

        .product-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .product-title { font-size: 14px; font-weight: 500; }
        .product-price { font-size: 13px; color: var(--tg-theme-hint-color, var(--text-hint)); }

        .buy-btn {
            margin-top: 8px;
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            border-radius: 6px;
            padding: 4px;
            font-size: 12px;
            cursor: pointer;
        }

        /* МАРКЕР: ИНТЕРФЕЙС КОРЗИНЫ */
        .cart-bar {
            position: fixed;
            bottom: 20px;
            left: 16px;
            right: 16px;
            background: var(--accent);
            color: white;
            padding: 12px 20px;
            border-radius: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: none; /* Скрыта пока пуста */
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(100px); }
            to { transform: translateY(0); }
        }

        /* МАРКЕР: МОДАЛЬНОЕ ОКНО СОЗДАНИЯ */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            width: 80%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        input {
            background: #252525;
            border: 1px solid #333;
            padding: 10px;
            border-radius: 8px;
            color: white;
            outline: none;
        }

        .save-btn {
            background: var(--accent);
            border: none;
            padding: 10px;
            border-radius: 8px;
            color: white;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>Каталог</h2>
        <button class="add-product-btn" onclick="toggleModal(true)">+</button>
    </div>

    <div class="catalog" id="catalog">
        </div>

    <div class="cart-bar" id="cart-bar" onclick="sendOrder()">
        <span>У кошику: <span id="cart-count">0</span></span>
        <span id="cart-total">0 ₴</span>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <h3 style="margin-bottom:10px">Новий товар</h3>
            <input type="text" id="p-name" placeholder="Назва">
            <input type="number" id="p-price" placeholder="Ціна (₴)">
            <input type="file" id="p-img" accept="image/*">
            <button class="save-btn" onclick="createNewProduct()">Додати в каталог</button>
            <button style="background:none; border:none; color:gray; font-size:12px" onclick="toggleModal(false)">Скасувати</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let cart = [];
        let products = [];

        // МАРКЕР: ОТКРЫТЬ/ЗАКРЫТЬ МОДАЛКУ
        function toggleModal(show) {
            document.getElementById('modal').style.display = show ? 'flex' : 'none';
        }

        // МАРКЕР: СОЗДАНИЕ НОВОГО ТОВАРА
        function createNewProduct() {
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            const imgFile = document.getElementById('p-img').files[0];
            
            if (!name || !price) return alert("Заповніть поля!");

            // Читаем фото
            const reader = new FileReader();
            reader.onload = function(e) {
                const newProduct = {
                    id: Date.now(),
                    name: name,
                    price: parseInt(price),
                    img: e.target.result || ''
                };
                products.push(newProduct);
                renderCatalog();
                toggleModal(false);
                // Очистка полей
                document.getElementById('p-name').value = '';
                document.getElementById('p-price').value = '';
            };
            
            if (imgFile) {
                reader.readAsDataURL(imgFile);
            } else {
                reader.onload({target: {result: ''}});
            }
        }

        // МАРКЕР: ОТРИСОВКА КАТАЛОГА
        function renderCatalog() {
            const container = document.getElementById('catalog');
            container.innerHTML = '';

            products.forEach(p => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <img src="${p.img || 'https://via.placeholder.com/100'}" class="product-img">
                    <div class="product-info">
                        <span class="product-title">${p.name}</span>
                        <span class="product-price">${p.price} ₴</span>
                    </div>
                    <button class="buy-btn" onclick="addToCart(${p.id})">Додати</button>
                `;
                container.appendChild(card);
            });
        }

        // МАРКЕР: ЛОГИКА КОРЗИНЫ
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            cart.push(product);
            tg.HapticFeedback.impactOccurred('medium');
            updateCartUI();
        }

        function updateCartUI() {
            const cartBar = document.getElementById('cart-bar');
            const countEl = document.getElementById('cart-count');
            const totalEl = document.getElementById('cart-total');

            if (cart.length > 0) {
                cartBar.style.display = 'flex';
                countEl.innerText = cart.length;
                const total = cart.reduce((sum, item) => sum + item.price, 0);
                totalEl.innerText = total + ' ₴';
            }
        }

        function sendOrder() {
            if (cart.length === 0) return;
            tg.sendData(JSON.stringify(cart));
            tg.close();
        }
    </script>
</body>
</html>
