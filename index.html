<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Shop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #161618;
            --accent: #007aff;
            --text: #ffffff;
            --hint: #8e8e93;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 16px; transition: all 0.3s; }

        /* МАРКЕР: АНИМАЦИИ ПЕРЕКЛЮЧЕНИЯ СТРАНИЦ */
        .page { display: none; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* ШАПКА */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header-btn { background: none; border: none; color: var(--text); font-size: 20px; cursor: pointer; position: relative; }
        
        .cart-badge {
            position: absolute; top: -5px; right: -8px; background: var(--accent);
            font-size: 10px; padding: 2px 6px; border-radius: 10px; display: none;
        }

        /* ПОИСК И СЕТКА */
        .search-input { width: 100%; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 12px; padding: 12px; color: white; margin-bottom: 20px; outline: none; }
        .catalog { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .product-card { background: var(--card); border-radius: 16px; padding: 10px; border: 1px solid var(--glass-border); }
        .product-img { width: 100%; height: 110px; object-fit: cover; border-radius: 10px; margin-bottom: 10px; background: var(--glass); }
        
        /* ЭКРАН КОРЗИНЫ */
        .cart-item {
            display: flex; align-items: center; background: var(--card); 
            padding: 12px; border-radius: 16px; margin-bottom: 10px; gap: 12px;
            animation: fadeIn 0.3s ease;
        }
        .cart-item img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; }
        .cart-item-info { flex: 1; }
        .qty-controls { display: flex; align-items: center; gap: 12px; background: var(--glass); padding: 4px 10px; border-radius: 20px; }
        .qty-btn { border: none; background: none; color: var(--accent); font-size: 18px; font-weight: bold; cursor: pointer; }

        /* КНОПКА ОФОРМИТЬ */
        .order-footer {
            position: fixed; bottom: 0; left: 0; right: 0; padding: 20px;
            background: linear-gradient(transparent, var(--bg) 20%);
        }
        .main-btn {
            width: 100%; background: var(--accent); border: none; padding: 16px;
            border-radius: 16px; color: white; font-weight: 600; font-size: 16px;
        }

        /* МОДАЛКА ДОБАВЛЕНИЯ */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(8px); }
        .modal-content { background: var(--card); padding: 25px; border-radius: 20px; width: 85%; display: flex; flex-direction: column; gap: 15px; }
        .image-upload { width: 100px; height: 100px; border: 2px dashed var(--glass-border); border-radius: 15px; display: flex; align-items: center; justify-content: center; margin: 0 auto; position: relative; overflow: hidden; background: var(--glass); }
        #p-img { position: absolute; opacity: 0; width: 100%; height: 100%; }
        #preview-img { width: 100%; height: 100%; object-fit: cover; display: none; }
    </style>
</head>
<body>

    <div id="catalog-page" class="page active">
        <div class="header">
            <button class="header-btn" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></button>
            <h2 style="font-size: 18px;">Магазин</h2>
            <div style="display: flex; gap: 15px;">
                <button class="header-btn" onclick="toggleModal(true)"><i class="fa-solid fa-plus"></i></button>
                <button class="header-btn" onclick="openCart()">
                    <i class="fa-solid fa-cart-shopping"></i>
                    <span id="cart-badge" class="cart-badge">0</span>
                </button>
            </div>
        </div>
        <input type="text" class="search-input" placeholder="Поиск товаров..." oninput="search(this.value)">
        <div class="catalog" id="catalog-list"></div>
    </div>

    <div id="cart-page" class="page">
        <div class="header">
            <button class="header-btn" onclick="openCatalog()"><i class="fa-solid fa-arrow-left"></i></button>
            <h2 style="font-size: 18px;">Корзина</h2>
            <div style="width: 20px;"></div>
        </div>
        <div id="cart-items-list"></div>
        <div class="order-footer">
            <div style="display: flex; justify-content: space-between; margin-bottom: 15px; font-weight: 500;">
                <span>Итого:</span>
                <span id="total-sum">0 ₴</span>
            </div>
            <button class="main-btn" onclick="checkout()">Оформить заказ</button>
        </div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <h3 style="text-align: center;">Новый товар</h3>
            <div class="image-upload">
                <i class="fa-solid fa-camera" id="cam-icon"></i>
                <img id="preview-img">
                <input type="file" id="p-img" accept="image/*" onchange="previewFile()">
            </div>
            <input type="text" id="p-name" class="search-input" placeholder="Название">
            <input type="number" id="p-price" class="search-input" placeholder="Цена (₴)">
            <button class="main-btn" onclick="createProduct()">Создать</button>
            <button onclick="toggleModal(false)" style="background:none; border:none; color:var(--hint);">Отмена</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let products = [];
        let cart = {}; // Храним в формате { id: {item, qty} }

        function openCart() {
            document.getElementById('catalog-page').classList.remove('active');
            document.getElementById('cart-page').classList.add('active');
            renderCart();
        }

        function openCatalog() {
            document.getElementById('cart-page').classList.remove('active');
            document.getElementById('catalog-page').classList.add('active');
        }

        function toggleModal(s) { document.getElementById('modal').style.display = s ? 'flex' : 'none'; }

        function previewFile() {
            const file = document.getElementById('p-img').files[0];
            const reader = new FileReader();
            reader.onloadend = () => {
                document.getElementById('preview-img').src = reader.result;
                document.getElementById('preview-img').style.display = 'block';
                document.getElementById('cam-icon').style.display = 'none';
            }
            if (file) reader.readAsDataURL(file);
        }

        function createProduct() {
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            const img = document.getElementById('preview-img').src;
            if(!name || !price) return;
            const p = { id: Date.now(), name, price: parseInt(price), img: img.includes('data:') ? img : '' };
            products.push(p);
            renderCatalog(products);
            toggleModal(false);
        }

        function renderCatalog(list) {
            const c = document.getElementById('catalog-list');
            c.innerHTML = list.map(p => `
                <div class="product-card">
                    <img src="${p.img || 'https://via.placeholder.com/150'}" class="product-img">
                    <div style="font-size: 14px; font-weight: 500;">${p.name}</div>
                    <div style="color: var(--accent); margin: 4px 0;">${p.price} ₴</div>
                    <button class="main-btn" style="padding: 8px; font-size: 12px;" onclick="addToCart(${p.id})">Добавить</button>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const p = products.find(x => x.id === id);
            if(cart[id]) cart[id].qty++;
            else cart[id] = { ...p, qty: 1 };
            tg.HapticFeedback.impactOccurred('light');
            updateBadge();
        }

        function updateBadge() {
            const count = Object.values(cart).reduce((s, i) => s + i.qty, 0);
            const b = document.getElementById('cart-badge');
            b.innerText = count;
            b.style.display = count > 0 ? 'block' : 'none';
        }

        function renderCart() {
            const list = document.getElementById('cart-items-list');
            const items = Object.values(cart);
            if(items.length === 0) {
                list.innerHTML = '<p style="text-align:center; color:var(--hint); margin-top:50px;">Корзина пуста</p>';
                document.getElementById('total-sum').innerText = '0 ₴';
                return;
            }
            list.innerHTML = items.map(i => `
                <div class="cart-item">
                    <img src="${i.img || 'https://via.placeholder.com/150'}">
                    <div class="cart-item-info">
                        <div style="font-size: 14px;">${i.name}</div>
                        <div style="color: var(--accent); font-size: 13px;">${i.price} ₴</div>
                    </div>
                    <div class="qty-controls">
                        <button class="qty-btn" onclick="updateQty(${i.id}, -1)">-</button>
                        <span>${i.qty}</span>
                        <button class="qty-btn" onclick="updateQty(${i.id}, 1)">+</button>
                    </div>
                </div>
            `).join('');
            const total = items.reduce((s, i) => s + (i.price * i.qty), 0);
            document.getElementById('total-sum').innerText = total + ' ₴';
        }

        function updateQty(id, delta) {
            cart[id].qty += delta;
            if(cart[id].qty <= 0) delete cart[id];
            renderCart();
            updateBadge();
        }

        function checkout() {
            const items = Object.values(cart);
            if(items.length === 0) return;
            // Отправляем данные боту
            tg.sendData(JSON.stringify(items));
        }

        function search(q) {
            const f = products.filter(p => p.name.toLowerCase().includes(q.toLowerCase()));
            renderCatalog(f);
        }
    </script>
</body>
</html>
